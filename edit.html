<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수정페이지</title>
    <link rel="stylesheet" href="edit_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500,700,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="edit-container">
        <header>
            <a href="index.html" id="main-page-btn" class="button link-button">메인화면</a>
            <h1>수정페이지</h1>
            <div class="header-buttons">
                 <button id="save-btn" class="button primary-button">저장</button>
                 <button id="reset-edit-btn" class="button secondary-button">초기화</button>
            </div>
        </header>
        <main>
            <div class="left-column">
                <section class="card status-card">
                    <h2>오늘 활동 현황</h2>
                    <ul id="edit-today-activity"></ul>
                </section>
                <section class="card status-card">
                    <h2>오늘 교육 현황</h2>
                    <ul id="edit-today-education"></ul>
                </section>
            </div>
            <section class="card mission-card">
                <h2>미션 내용</h2>
                <ul id="edit-mission-list"></ul>
            </section>
        </main>
    </div>
     <script src="edit.js"></script>
</body>
</html>
