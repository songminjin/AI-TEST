        }

        .container {
            text-align: center;
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            transition: background-color 0.3s;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        #generate-btn {
            background-color: var(--primary-color);
            color: var(--background-color);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
        }

        #generate-btn:hover {
            background-color: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color), 0 0 25px var(--secondary-color), 0 0 35px var(--secondary-color);
        }
        
        body.light-mode #generate-btn {
            color: var(--text-color);
        }


        .numbers-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
        }

        #numbers,
        #bonus-number {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .number-circle,
        .bonus-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin: 5px;
            color: var(--background-color);
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }
        
        body.light-mode .number-circle, body.light-mode .bonus-circle {
            color: var(--text-color);
        }

        .number-circle {
            background-color: var(--secondary-color);
            box-shadow: 0 0 10px var(--secondary-color);
        }

        .bonus-circle {
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* Theme switcher styles */
        .theme-switch-wrapper {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div class="numbers-container">
            <div id="numbers"></div>
            <div id="bonus-number"></div>
        </div>
    </div>
    <script>
        console.log("main.js loaded");

        // Theme switcher logic
        const themeSwitch = document.getElementById('checkbox');
        
        // Function to apply theme
        const applyTheme = (theme) => {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                themeSwitch.checked = true;
            } else {
                document.body.classList.remove('light-mode');
                themeSwitch.checked = false;
            }
        };

        // Check for saved preference on load
        const currentTheme = localStorage.getItem('theme');
        applyTheme(currentTheme || 'dark'); // Default to dark

        themeSwitch.addEventListener('change', () => {
            const newTheme = themeSwitch.checked ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        });


        // Lotto generator logic
        document.getElementById('generate-btn').addEventListener('click', () => {
            console.log("Generate button clicked!");
            const numbersDiv = document.getElementById('numbers');
            const bonusNumberDiv = document.getElementById('bonus-number');

            numbersDiv.innerHTML = '';
            bonusNumberDiv.innerHTML = '';

            const lottoNumbers = generateLottoNumbers();
            const bonusNumber = lottoNumbers.pop();

            lottoNumbers.forEach(number => {
                const circle = document.createElement('div');
                circle.classList.add('number-circle');
                circle.textContent = number;
                numbersDiv.appendChild(circle);
            });

            const bonusCircle = document.createElement('div');
            bonusCircle.classList.add('bonus-circle');
            bonusCircle.textContent = bonusNumber;
            bonusNumberDiv.appendChild(bonusCircle);
        });

        function generateLottoNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                const randomNumber = Math.floor(Math.random() * 45) + 1;
                numbers.add(randomNumber);
            }
            return Array.from(numbers).sort((a,b) => a-b); // Also sorting the numbers
        }
    </script>
</body>
