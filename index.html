<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유월절 페스티벌 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>유월절 페스티벌</h1>
            <a href="edit.html" class="edit-button">수정</a>
        </header>

        <main class="main-content">
            <!-- 좌측: 활동 현황 -->
            <div class="left-column">
                <section class="status-section today-activity">
                    <h2>오늘 활동 현황</h2>
                    <div class="item-group">
                        <div class="item"><span class="label">단순</span><span class="value" id="d-soon">0명</span></div>
                        <div class="item"><span class="label">유효</span><span class="value" id="yuhyo">0명</span></div>
                        <div class="item"><span class="label">침례</span><span class="value" id="chimrye">0명</span></div>
                        <div class="item"><span class="label">출석</span><span class="value" id="chulseok">0명</span></div>
                    </div>
                </section>
                
                <section class="status-section cumulative-activity">
                    <h2>누적 활동 현황</h2>
                    <div class="item-group">
                        <div class="item"><span class="label">단순</span><span class="value" id="cumulative-d-soon">0명</span></div>
                        <div class="item"><span class="label">유효</span><span class="value" id="cumulative-yuhyo">0명</span></div>
                        <div class="item"><span class="label">침례</span><span class="value" id="cumulative-chimrye">0명</span></div>
                        <div class="item"><span class="label">출석</span><span class="value" id="cumulative-chulseok">0명</span></div>
                    </div>
                </section>
            </div>

            <!-- 중앙: 빙고 및 누적 점수 -->
            <div class="center-column">
                <div class="cumulative-score-section">
                    <h2>누적점수: <span id="cumulative-score">____</span></h2>
                </div>
                <section class="bingo-section">
                    <h2>빙고 미션</h2>
                    <div class="bingo-grid">
                        <!-- 4x4 Bingo cells will be generated by JavaScript -->
                    </div>
                </section>
            </div>

            <!-- 우측: 미션 내용 -->
            <div class="right-column">
                <section class="mission-section">
                    <h2>미션내용</h2>
                    <ul id="mission-list">
                        <!-- Mission items will be generated by JavaScript -->
                    </ul>
                </section>
                 <button id="reset-button" class="reset-button">초기화</button>
            </div>
        </main>
    </div>
    <script src="main.js?v=3.0"></script>
</body>
</html>
