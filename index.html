<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페스티벌 대시보드</title>
    <link rel="stylesheet" href="main_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>페스티벌</h1>
            <div class="buttons">
                <a href="edit.html" id="edit-btn" class="button">수정</a>
                <button id="reset-btn" class="button">초기화</button>
            </div>
        </header>
        <main>
            <!-- Left Column -->
            <section class="card status-card">
                <h2>오늘 활동 현황</h2>
                <ul id="today-activity-status">
                    <li><span>단순</span><span data-key="simple">0명</span></li>
                    <li><span>유효</span><span data-key="valid">0명</span></li>
                    <li><span>침례</span><span data-key="baptism">0명</span></li>
                    <li><span>출석</span><span data-key="attendance">0명</span></li>
                    <li><span>온라인</span><span data-key="online">0명</span></li>
                </ul>
                <h2>누적 활동 현황</h2>
                <ul id="total-activity-status">
                    <li><span>단순</span><span data-key="simple">0명</span></li>
                    <li><span>유효</span><span data-key="valid">0명</span></li>
                    <li><span>침례</span><span data-key="baptism">0명</span></li>
                    <li><span>출석</span><span data-key="attendance">0명</span></li>
                    <li><span>온라인</span><span data-key="online">0명</span></li>
                </ul>
                <h2>누적 교육 현황</h2>
                <ul id="total-education-status">
                    <li><span>프리칭</span><span data-key="preaching">0명</span></li>
                    <li><span>엘카</span><span data-key="elca">0명</span></li>
                    <li><span>새성도</span><span data-key="newBeliever">0명</span></li>
                    <li><span>온라인</span><span data-key="onlineEdu">0명</span></li>
                </ul>
            </section>

            <!-- Center Column -->
            <div class="center-column">
                <section class="card score-card">
                    <h2>누적점수</h2>
                    <p id="total-score">0</p>
                </section>
                <section class="card bingo-card">
                    <h2>빙고 미션</h2>
                    <div id="bingo-grid" class="bingo-grid">
                        <!-- JS will generate this -->
                    </div>
                </section>
            </div>

            <!-- Right Column -->
            <div class="right-column">
                <section class="card letter-card">
                    <h2>누적서신</h2>
                    <p id="letter-count">0</p>
                </section>
                <section class="card mission-card">
                    <h2>미션내용</h2>
                    <ul id="mission-list">
                        <!-- JS will generate this -->
                    </ul>
                </section>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
