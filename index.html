        .container {
            text-align: center;
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #generate-btn {
            background-color: var(--primary-color);
            color: var(--background-color);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
        }

        #generate-btn:hover {
            background-color: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color), 0 0 25px var(--secondary-color), 0 0 35px var(--secondary-color);
        }

        .numbers-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
        }

        #numbers,
        #bonus-number {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .number-circle,
        .bonus-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin: 5px;
            color: var(--background-color);
            font-weight: bold;
        }

        .number-circle {
            background-color: var(--secondary-color);
            box-shadow: 0 0 10px var(--secondary-color);
        }

        .bonus-circle {
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div class="numbers-container">
            <div id="numbers"></div>
            <div id="bonus-number"></div>
        </div>
    </div>
    <script>
        console.log("main.js loaded");

        document.getElementById('generate-btn').addEventListener('click', () => {
            console.log("Generate button clicked!");
            const numbersDiv = document.getElementById('numbers');
            const bonusNumberDiv = document.getElementById('bonus-number');

            numbersDiv.innerHTML = '';
            bonusNumberDiv.innerHTML = '';

            const lottoNumbers = generateLottoNumbers();
            const bonusNumber = lottoNumbers.pop();

            lottoNumbers.forEach(number => {
                const circle = document.createElement('div');
                circle.classList.add('number-circle');
                circle.textContent = number;
                numbersDiv.appendChild(circle);
            });

            const bonusCircle = document.createElement('div');
            bonusCircle.classList.add('bonus-circle');
            bonusCircle.textContent = bonusNumber;
            bonusNumberDiv.appendChild(bonusCircle);
        });

        function generateLottoNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                const randomNumber = Math.floor(Math.random() * 45) + 1;
                numbers.add(randomNumber);
            }
            return Array.from(numbers);
        }
    </script>
</body>
</html>
